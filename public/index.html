<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>✨ 文本中转站</title>
    <meta name="description" content="安全便捷的文本中转工具">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container">
      <section class="slots" aria-label="文本框列表">
        <article class="slot" data-slot="1">
          <label for="slot-1">文本框 1</label>
          <div class="textarea-wrap">
            <textarea id="slot-1" rows="8" placeholder="输入或点击显示"></textarea>
            <button type="button" class="delete-x" data-action="delete" data-slot="1" aria-label="删除文本框 1">×</button>
          </div>
          <div class="actions">
            <button type="button" data-action="copy" data-slot="1">复制</button>
            <button type="button" class="eye-toggle" data-action="toggle" data-slot="1" aria-label="隐藏文本框 1">
              <svg class="eye-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.25 12s3.5-6.25 9.75-6.25S21.75 12 21.75 12 18.25 18.25 12 18.25 2.25 12 2.25 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                <path class="eye-slash" d="M4.5 20 19.5 4"></path>
              </svg>
              <span class="sr-only">隐藏</span>
            </button>
          </div>
          <p class="status" id="status-1" aria-live="polite"></p>
        </article>

        <article class="slot" data-slot="2">
          <label for="slot-2">文本框 2</label>
          <div class="textarea-wrap">
            <textarea id="slot-2" rows="8" placeholder="输入或点击显示"></textarea>
            <button type="button" class="delete-x" data-action="delete" data-slot="2" aria-label="删除文本框 2">×</button>
          </div>
          <div class="actions">
            <button type="button" data-action="copy" data-slot="2">复制</button>
            <button type="button" class="eye-toggle" data-action="toggle" data-slot="2" aria-label="隐藏文本框 2">
              <svg class="eye-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.25 12s3.5-6.25 9.75-6.25S21.75 12 21.75 12 18.25 18.25 12 18.25 2.25 12 2.25 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                <path class="eye-slash" d="M4.5 20 19.5 4"></path>
              </svg>
              <span class="sr-only">隐藏</span>
            </button>
          </div>
          <p class="status" id="status-2" aria-live="polite"></p>
        </article>
      </section>
    </main>

    <script src="app.js?v=2" defer></script>
  </body>
</html>
