<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>✨ 文本中转站</title>
    <meta name="description" content="安全便捷的文本中转工具">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container">
      <section class="slots" id="slots" aria-label="文本框列表"></section>
    </main>

    <template id="slot-template">
      <article class="slot">
        <div class="slot-header">
          <div class="drag-handle" aria-label="拖拽调整位置">⋮⋮</div>
          <input class="title-input" type="text" placeholder="" aria-label="文本框标题">
          <button type="button" class="delete-box" data-action="delete" aria-label="删除文本框">×</button>
        </div>
        <div class="textarea-wrap">
          <textarea rows="8" placeholder="输入或点击显示"></textarea>
        </div>
        <div class="actions">
          <button type="button" data-action="copy">复制</button>
          <button type="button" class="eye-toggle" data-action="toggle" aria-label="隐藏文本框">
            <svg class="eye-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.25 12s3.5-6.25 9.75-6.25S21.75 12 21.75 12 18.25 18.25 12 18.25 2.25 12 2.25 12Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
              <path class="eye-slash" d="M4.5 20 19.5 4"></path>
            </svg>
            <span class="sr-only">隐藏</span>
          </button>
          <button type="button" class="eye-toggle" data-action="add" aria-label="新增文本框">添加</button>
        </div>
        <p class="status" aria-live="polite"></p>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="app.js?v=3" defer></script>
  </body>
</html>
